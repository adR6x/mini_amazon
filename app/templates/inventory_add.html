{% extends "base.html" %}

{% block content %}
<br><br>

<h2 class="text-center mb-4">Add New Inventory Item</h2>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card shadow-sm p-4" style="border-radius: 15px;">
        <div class="row g-4">

          <!-- Left Column: Name + Image -->
          <div class="col-md-5 d-flex flex-column align-items-center">
            <h3 class="text-center">Product Details</h3>
            <div class="mt-3 w-100" style="height: 250px; background-color: #e5e7eb; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
              <span class="text-muted">Product Image Placeholder</span>
            </div>
          </div>

          <!-- Right Column: Info + Editable Inputs -->
          <div class="col-md-7 pt-md-5 mt-md-4" style="padding-top: 60px;">
            <form id="add-inventory-form">
              <div class="mb-4 fs-5">
                <strong>Product Name:</strong>
                <input type="text" class="form-control mt-2" id="product-name" required>
              </div>
              <div class="mb-4 fs-5">
                <strong>Description:</strong>
                <textarea class="form-control mt-2" id="description" rows="3"></textarea>
              </div>
              <div class="mb-4 fs-5">
                <strong>Image URL:</strong>
                <input type="url" class="form-control mt-2" id="image-url">
              </div>
              <div class="mb-4 fs-5">
                <strong>Category:</strong>
                <select class="form-control mt-2" id="category-id" required>
                  <option value="" disabled selected>Select a category</option>
                  {% for category in categories %}
                  <option value="{{ category.id }}">{{ category.name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-4 fs-5">
                <strong>Price ($):</strong>
                <input type="number" step="0.01" class="form-control mt-2" id="price" min="0" required>
              </div>
              <div class="mb-4 fs-5">
                <strong>Quantity Available:</strong>
                <input type="number" class="form-control mt-2" id="quantity-available" min="0" required>
              </div>
              <button type="submit" class="btn btn-primary mt-4">Add Inventory</button>
            </form>
            <a href="{{ url_for('inventory.inventory_page') }}" class="btn btn-outline-primary mt-4">Back to Inventory</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
    document.getElementById('add-inventory-form').addEventListener('submit', function(event) {
      event.preventDefault();
      const data = {
        short_name: document.getElementById('product-name').value,
        description: document.getElementById('description').value,
        image_url: document.getElementById('image-url').value,
        category_id: document.getElementById('category-id').value,
        price: document.getElementById('price').value,
        quantity_available: document.getElementById('quantity-available').value
      };

      fetch('/inventory/add', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token() if csrf_token }}'
        },
        body: JSON.stringify(data)
      }).then(response => response.json()).then(data => {
        if (data.success) {
          alert('Inventory added successfully!');
          window.location.href = "{{ url_for('inventory.inventory_page') }}";
        } else {
          alert(data.error || 'Failed to add inventory.');
        }
      });
    });
</script>

{% endblock %}
