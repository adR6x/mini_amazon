<!DOCTYPE html>
<html lang="en">

<head>
  <title>Mini Amazon</title>
  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
  <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
  <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/example.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        font-family: "Lato", sans-serif;
    }
    .navbar {
        background-color: #93c5fd;
        display: flex;
        flex-direction: column;
        align-items: left;
    }
    .navbar-brand {
        font-size: 24px;
        font-weight: bold;
    }
    .nav-container {
        display: flex;
        justify-content: left;
        width: 100%;
    }
    .navbar-nav {
        display: flex;
        flex-direction: row;
        gap: 15px;
    }
    .nav-link {
        color: black !important;
        padding: 10px 15px;
        transition: color 0.3s, background-color 0.3s;
    }
    .nav-link:hover {
        background-color: #ffcccb;
        color: white !important;
        border-radius: 5px;
    }
    .nav-link.active {
        color: red !important;
        font-weight: bold;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-light">
    <a class="navbar-brand" href="#">Little Amazon</a>
    <div class="nav-container">
      {% if current_user.is_authenticated %}
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Orders</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Inventory</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('review.review_history_all') }}">Review</a></li>
        </ul>
          <div class="text-center"><a href="{{ url_for('users.logout') }}" type="button" class="btn btn-light">Log out</a></div>
      {% else %}
          <div class="text-center"><a href="{{ url_for('users.login') }}" type="button" class="btn btn-light">Log in</a></div>
      {% endif %}
    </div>
  </nav>

  <div class="container mt-3">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
