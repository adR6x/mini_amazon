<!DOCTYPE html>
<html lang="en">

<head>
  <title>Mini Amazon</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/example.css') }}">
  <style>
    body {
      font-family: "Lato", sans-serif;
    }
    .navbar {
      background-color: #93c5fd;
    }
    .navbar-brand {
      font-size: 24px;
      font-weight: bold;
    }
    .nav-link {
      color: black !important;
      padding: 10px 15px;
      transition: color 0.3s, background-color 0.3s;
    }
    .nav-link:hover {
      background-color: #ffcccb;
      color: white !important;
      border-radius: 5px;
    }
    .nav-link.active {
      color: red !important;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Little Amazon</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" 
              aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarContent">
        {% if current_user.is_authenticated %}
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Cart</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Orders</a></li>
            <li class="nav-item">
              <a class="nav-link {% if request.endpoint == 'inventory.inventory_page' %}active{% endif %}"
                 href="{{ url_for('inventory.inventory_page') }}">
                Inventory
              </a>
            </li>            
            <li class="nav-item"><a class="nav-link" href="{{ url_for('index.index') }}">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('review.review_history_all') }}">Review</a></li>
          </ul>
          <div class="d-flex">
            <a href="{{ url_for('users.logout') }}" class="btn btn-light">Log out</a>
          </div>
        {% else %}
          <div class="d-flex ms-auto">
            <a href="{{ url_for('users.login') }}" class="btn btn-light">Log in</a>
          </div>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container mt-3">
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap 5 Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
