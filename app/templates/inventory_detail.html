{% extends "base.html" %}

{% block content %}
<br><br>

<h2 class="text-center mb-4">Edit Inventory Item</h2>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <form id="edit-inventory-form">
        <div class="card shadow-sm p-4" style="border-radius: 15px;">
          <div class="row g-4">

            <!-- Left Column: Name -->
            <div class="col-md-5 d-flex flex-column align-items-center">
              <input type="text" class="form-control mb-3" id="product-name" value="{{ item.product_name }}" placeholder="Product Name">
              <div class="mt-3 w-100" style="height: 250px; background-color: #e5e7eb; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <span class="text-muted">Product Image Placeholder</span>
              </div>
            </div>

            <!-- Right Column: Info + Editable Inputs -->
            <div class="col-md-7 pt-md-5 mt-md-4" style="padding-top: 60px;">
              <div class="mb-4 fs-5">
                <strong>Product ID:</strong> {{ item.product_id }}
              </div>
              <div class="mb-4 fs-5">
                <strong>Description:</strong>
                <textarea class="form-control mt-2" id="description" placeholder="Description">{{ item.description }}</textarea>
              </div>
              <div class="mb-4 fs-5">
                <strong>Category:</strong>
                <select class="form-control mt-2" id="category-id">
                  {% for category in categories %}
                  <option value="{{ category.id }}" {% if category.id == item.category_id %}selected{% endif %}>{{ category.name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-4 fs-5">
                <strong>Image URL:</strong>
                <input type="text" class="form-control mt-2" id="image-url" value="{{ item.image_url }}" placeholder="Image URL">
              </div>
              <div class="mb-4 fs-5">
                <strong>Quantity Available:</strong>
                <input type="number" class="form-control mt-2" id="quantity-available" value="{{ item.quantity_available }}" min="0">
              </div>
              <div class="mb-4 fs-5">
                <strong>Price ($):</strong>
                <input type="number" step="0.01" class="form-control mt-2" id="price" value="{{ '%.2f' | format(item.price) }}" min="0">
              </div>
              <button type="submit" class="btn btn-primary mt-4">Save Changes</button>
              <a href="{{ url_for('inventory.inventory_page') }}" class="btn btn-outline-primary mt-4">Back to Inventory</a>
            </div>

          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- JavaScript to handle form submission -->
<script>
  document.getElementById('edit-inventory-form').addEventListener('submit', function(event) {
    event.preventDefault();
    
    // Collect form data
    const data = {
      product_name: document.getElementById('product-name').value,
      description: document.getElementById('description').value,
      image_url: document.getElementById('image-url').value,
      category_id: document.getElementById('category-id').value,
      price: document.getElementById('price').value,
      quantity_available: document.getElementById('quantity-available').value
    };

    // Debug: Log the data being sent
    console.log("Submitting data:", data);

    fetch(`/inventory/item/{{ item.product_id }}/update`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token() if csrf_token }}'
      },
      body: JSON.stringify(data)
    }).then(response => {
      // Debug: Log the response status
      console.log("Response status:", response.status);

      if (response.ok) {
        alert('Inventory item updated successfully!');
        window.location.href = "{{ url_for('inventory.inventory_page') }}";
      } else {
        // Debug: Log the response text for errors
        response.text().then(text => {
          console.error("Error response text:", text);
          alert('Failed to update inventory item.');
        });
      }
    }).catch(error => {
      // Debug: Log any fetch errors
      console.error("Fetch error:", error);
      alert('An error occurred while updating the inventory item.');
    });
  });
</script>

{% endblock %}
