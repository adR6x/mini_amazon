{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Edit Product Review</h2>
  <form method="POST">
    <div class="mb-3">
      <label for="rating" class="form-label">Rating</label>
      <select class="form-select" id="rating" name="rating" required>
        {% for i in range(1,6) %}
          <option value="{{ i }}" {% if review.rating == i %}selected{% endif %}>
            {{ "★" * i }}{{ "☆" * (5 - i) }} ({{ i }})
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="review_text" class="form-label">Review</label>
      <textarea class="form-control" id="review_text" name="review_text" rows="4">{{ review.review_text }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{{ url_for('review.review_history_all', review_type='product') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
