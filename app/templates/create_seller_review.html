{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2 class="mb-4">Write a Review for Seller {{ seller_id }}</h2>
  <form method="POST" action="{{ url_for('review.create_seller_review', seller_id=seller_id) }}">
    <div class="mb-3">
      <label for="rating" class="form-label">Rating (1–5)</label>
      <select name="rating" id="rating" class="form-select" required>
        {% for i in range(1,6) %}
          <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label for="review_text" class="form-label">Review</label>
      <textarea name="review_text" id="review_text" class="form-control" rows="4"
                placeholder="Tell us about your experience…"></textarea>
    </div>

    <div class="mb-3">
      <label for="image_url" class="form-label">Image URL (optional)</label>
      <input type="url" name="image_url" id="image_url" class="form-control"
             placeholder="https://…">
    </div>

    <button type="submit" class="btn btn-primary">Submit Review</button>
    <a href="{{ url_for('review.review_history_all', review_type='seller') }}"
       class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
